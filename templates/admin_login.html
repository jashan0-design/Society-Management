<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Admin Login - Elite Society</title>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh;">

        <div class="building-card" style="width: 450px; padding: 40px;">
        <div style="font-size: 50px; margin-bottom: 10px;">⚙️</div>
        <h2 style="margin-bottom: 5px; color: #2c3e50;">Admin Login Portal</h2>
        <p style="color: #7f8c8d; margin-bottom: 30px; font-size: 0.9rem;">Society Management Admin Access</p>
        
        <form action="/login" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="hidden" name="user_type" value="admin">
            <div>

                <input type="text" name="username" placeholder="Username" required 
                       style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; background: #fff;">

            </div>
            <div>

                 <input type="password" name="password" placeholder="Password" required 
                        style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; background: #fff;">

            </div>
            <button type="submit" class="btn-premium" style="width: 100%; background: linear-gradient(135deg, #f39c12, #e67e22); color: white;">
                Admin Login
            </button>
        </form>

        <p style="margin-top: 25px; text-align: center;">
            <a href="/login" style="color: #3498db; text-decoration: none; font-weight: 600;">← Resident Login</a>
        </p>

        <div style="margin-top: 25px; font-size: 0.85rem; border-top: 1px solid #eee; padding-top: 20px;">
            <a href="/reset_password" style="color:#3498db; text-decoration: none; font-weight: 500;">Forgot Password?</a>
        </div>
    </div>

</body>
</html>
