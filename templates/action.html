<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Action - Elite Society Hub</title>
    <style>
        .action-card { max-width: 800px; margin: 60px auto; padding: 30px; background: rgba(255,255,255,0.9); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .action-card h1 { margin-top: 0; color: #2c3e50; }
        .action-card p { color: #555; line-height: 1.8; }
    </style>
</head>
<body>
    <nav>
        <a href="/dashboard">Dashboard</a>
        <a href="/residents">Residents</a>
        <a href="/bills">Bills</a>
        <a href="/notices">Notices</a>
        <a href="/complaints">Complaints</a>
        <a href="/profile">Profile</a>
        <a href="/logout" class="btn-premium" style="color: red;">Logout</a>
    </nav>

    <div class="action-card">
        <h1>Action: {{ action_name.replace('_', ' ').title() }}</h1>
        <p>{{ message }}</p>
        <div style="margin-top: 25px; display: flex; gap: 15px; flex-wrap: wrap;">
            <a href="/profile" class="button-link" style="background: #3498db; color: white;">Go to Profile</a>
            <a href="/dashboard" class="button-link" style="background: #27ae60; color: white;">Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
